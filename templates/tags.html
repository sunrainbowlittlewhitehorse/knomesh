{% extends "base.html" %}
{% block content %}

<div class="mb-xl">
  <h2 class="font-display-md text-display-md text-ink mb-xxs">标签管理</h2>
  <p class="text-secondary font-body-sm">管理所有标签，支持新建、重命名和删除。</p>
</div>

<!-- Create Tag -->
<div class="flex items-center gap-md mb-xl">
  <input id="new-tag-input"
    class="h-10 px-md w-64 bg-surface-soft border border-hairline rounded-lg text-body-sm focus:ring-3 focus:ring-primary/15 focus:border-primary outline-none transition-all"
    placeholder="新标签名称..." type="text" maxlength="30">
  <button id="btn-create-tag"
    class="h-10 px-md bg-primary text-on-primary rounded-lg hover:bg-primary-active transition-colors font-button text-button whitespace-nowrap">
    创建标签
  </button>
</div>

<!-- Tag List -->
<div id="tag-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-lg">
  {% for tag in tags %}
  <div class="tag-item bg-surface-card p-lg rounded-xl border border-hairline-soft" data-id="{{ tag.id }}">
    <div class="flex items-center justify-between mb-md">
      <div class="flex items-center gap-sm flex-1 min-w-0">
        <span class="w-3 h-3 rounded-full flex-shrink-0" style="background-color: {{ tag.color }}"></span>
        <span class="tag-name font-title-md text-title-md text-body-strong truncate">{{ tag.name }}</span>
        <input class="tag-rename-input hidden flex-1 h-8 px-sm bg-surface-soft border border-primary rounded text-body-sm outline-none min-w-0"
          type="text" maxlength="30" value="{{ tag.name }}">
      </div>
      <span class="font-caption text-caption text-muted-soft ml-sm flex-shrink-0">{{ tag.item_count }} 项</span>
    </div>
    <div class="flex items-center gap-sm">
      <button class="btn-rename px-sm py-xs text-sm text-primary hover:bg-surface-container rounded transition-colors font-button">
        <span class="material-symbols-outlined text-[16px]">edit</span>
      </button>
      <button class="btn-delete px-sm py-xs text-sm text-error hover:bg-error/10 rounded transition-colors font-button">
        <span class="material-symbols-outlined text-[16px]">delete</span>
      </button>
      <button class="btn-confirm hidden px-sm py-xs text-sm text-success hover:bg-success/10 rounded transition-colors font-button">
        <span class="material-symbols-outlined text-[16px]">check</span>
      </button>
      <button class="btn-cancel hidden px-sm py-xs text-sm text-muted hover:bg-hairline-soft rounded transition-colors font-button">
        <span class="material-symbols-outlined text-[16px]">close</span>
      </button>
    </div>
  </div>
  {% endfor %}
</div>

<!-- Empty state -->
<div id="empty-state" class="hidden text-center py-xxl">
  <p class="font-display-md text-display-md text-muted mb-md">还没有标签</p>
  <p class="font-body-md text-muted-soft mb-lg">创建你的第一个标签来组织知识</p>
</div>

<script src="{{ url_for('static', filename='js/tags.js') }}"></script>
{% endblock %}
